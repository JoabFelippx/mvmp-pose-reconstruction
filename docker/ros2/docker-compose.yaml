services:
  skeleton_ros2:
    build:
      context: ../..
      dockerfile: docker/ros2/Dockerfile
    container_name: skeleton_ros2
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - PYTHONPATH=/workspace/src
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../../src:/workspace/src
      - ../../etc:/workspace/etc
      - ../../calibrations:/workspace/calibrations
      - ../../datasets:/workspace/datasets
    network_mode: host
    command: ["ros2", "launch", "skeleton_ros2", "skeleton_pipeline.launch.py"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]